<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تنسيق العمليات</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
  .box { background: white; border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.1); max-width: 400px; }
  h2 { color: #555; margin-bottom: 12px; }
  p { color: #888; font-size: 1.1em; }
</style>
</head>
<body>
<div class="box">
  <h2>🔧 تحت الصيانة</h2>
  <p>الخدمة تحت الصيانة حالياً.<br>يرجى التواصل مع تنسيق العمليات.</p>
</div>
</body>
</html>
