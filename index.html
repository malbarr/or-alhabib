<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OR Schedule</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0f0f0f;
  --surface:    #1c1c1e;
  --card:       #2c2c2e;
  --border:     #3a3a3c;
  --text:       #ffffff;
  --subtext:    #8e8e93;
  --confirmed:  #30d158;
  --wl:         #ffd60a;
  --pd:         #ff9f0a;
  --cancelled:  #ff453a;
  --tentative:  #636366;
  --accent:     #0a84ff;
  --radius:     10px;
  --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
body { display: flex; flex-direction: column; overflow: hidden; }

/* ── Header ── */
.header {
  padding: 12px 16px 8px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header h1 { font-size: 16px; font-weight: 700; }
.refresh-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }

/* ── Date tabs ── */
.tabs-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; padding: 8px 12px; gap: 8px; width: max-content; }
.tab {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  color: var(--subtext); font-size: 13px; font-weight: 500; padding: 6px 14px;
  cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: var(--font);
}
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab.today  { border-color: var(--accent); color: var(--accent); }
.tab.today.active { color: #fff; }
.tab.drag-over { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(1.08); box-shadow: 0 0 0 3px rgba(10,132,255,0.4); }

/* ── Search bar ── */
.search-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  flex-shrink: 0;
}
.search-inner {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border-radius: 10px;
  padding: 6px 10px;
}
.search-icon { font-size: 14px; color: var(--subtext); flex-shrink: 0; }
.search-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 14px; font-family: var(--font);
}
.search-input::placeholder { color: var(--subtext); }
.search-clear {
  background: none; border: none; color: var(--subtext); font-size: 16px;
  cursor: pointer; padding: 0 2px; line-height: 1; display: none;
}

/* Search result row */
.search-result-date { font-size: 11px; color: var(--subtext); font-weight: 600; padding: 10px 16px 4px; }
.search-result-card {
  margin: 4px 12px; border-radius: var(--radius); padding: 10px 12px;
  background: var(--card); border-left: 4px solid transparent; cursor: pointer;
  display: flex; flex-direction: column; gap: 3px;
}
.search-result-card.confirmed { border-left-color: var(--confirmed); }
.search-result-card.wl        { border-left-color: var(--wl); }
.search-result-card.pd        { border-left-color: var(--pd); }
.search-result-card.cancelled { border-left-color: var(--cancelled); opacity: 0.6; }
.search-result-card.tentative { border-left-color: var(--tentative); }
.search-result-card:active    { opacity: 0.75; }
.sr-row1 { display: flex; align-items: center; gap: 6px; }
.sr-name  { font-size: 14px; font-weight: 700; flex: 1; }
.sr-row2  { display: flex; gap: 8px; font-size: 11px; color: var(--subtext); }
.sr-no-results { text-align: center; padding: 32px; color: var(--subtext); font-size: 14px; }

/* ── Calendar scroll area ── */
.schedule { flex: 1; overflow-y: auto; overflow-x: hidden; }

/* ── Calendar grid ── */
.cal-grid {
  position: relative;
  padding-left: 44px;
  padding-right: 8px;
  padding-bottom: 20px;
}

/* Time lines */
.time-row {
  position: absolute; left: 0; right: 0; pointer-events: none;
}
.time-label {
  position: absolute; left: 4px; font-size: 10px; color: var(--subtext);
  transform: translateY(-50%); font-variant-numeric: tabular-nums;
}
.time-line {
  position: absolute; left: 44px; right: 8px; border-top: 1px solid var(--border);
}
.time-line.half { border-top-color: rgba(58,58,60,0.4); border-top-style: dashed; }

/* Patient cards (absolute positioned) */
.patient-card {
  position: absolute; left: 44px; right: 8px;
  border-radius: var(--radius); overflow: hidden;
  cursor: pointer;
  border-left: 4px solid transparent;
  padding: 7px 8px 6px;
  transition: opacity 0.15s, box-shadow 0.15s;
  background: var(--card);
  user-select: none; -webkit-user-select: none;
}
.patient-card.confirmed { border-left-color: var(--confirmed); }
.patient-card.wl        { border-left-color: var(--wl); }
.patient-card.pd        { border-left-color: var(--pd); }
.patient-card.cancelled { border-left-color: var(--cancelled); opacity: 0.55; }
.patient-card.tentative { border-left-color: var(--tentative); }
.patient-card:active    { opacity: 0.75; }
.patient-card.drag-src  { opacity: 0.25; pointer-events: none; }

/* Card rows */
.slot-row1 { display: flex; align-items: center; gap: 6px; }
.slot-time  { font-size: 11px; font-weight: 600; color: var(--subtext); min-width: 32px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.slot-name  { font-size: 13px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.slot-badges { display: flex; gap: 3px; flex-shrink: 0; align-items: center; }
.badge {
  font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 5px;
  white-space: nowrap; line-height: 1.4;
}
.badge-approved    { background: rgba(48,209,88,0.18);  color: var(--confirmed); }
.badge-notapproved { background: rgba(255,69,58,0.18);  color: var(--cancelled); }
.badge-confirmed   { background: rgba(48,209,88,0.18);  color: var(--confirmed); }
.badge-wl          { background: rgba(255,214,10,0.18); color: var(--wl); }
.badge-pd          { background: rgba(255,159,10,0.18); color: var(--pd); }
.badge-cancelled   { background: rgba(255,69,58,0.18);  color: var(--cancelled); }
.badge-tentative   { background: rgba(99,99,102,0.25);  color: var(--subtext); }

.slot-row2 { display: flex; align-items: center; gap: 4px; margin-top: 2px; padding-left: 38px; }
.slot-proc { font-size: 11px; color: var(--subtext); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.slot-dur  { font-size: 10px; color: var(--subtext); flex-shrink: 0; }

.slot-row3 { display: flex; align-items: center; gap: 6px; margin-top: 1px; padding-left: 38px; }
.slot-file  { font-size: 10px; color: var(--subtext); }
.slot-phone { font-size: 10px; color: var(--subtext); }

/* Topic quick button on card */
.topic-btn {
  position: absolute; bottom: 5px; right: 6px;
  background: rgba(10,132,255,0.15); border: none; border-radius: 6px;
  color: var(--accent); font-size: 12px; padding: 2px 6px;
  cursor: pointer; line-height: 1.4;
}
.topic-btn:active { opacity: 0.7; }

/* Approval toggle button on card */
.approve-toggle {
  font-size: 13px; background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 1px 5px; cursor: pointer; line-height: 1.4;
  flex-shrink: 0; transition: background 0.15s;
}
.approve-toggle:active { opacity: 0.6; }
.approve-toggle.approved     { background: rgba(48,209,88,0.2);  border-color: rgba(48,209,88,0.5); }
.approve-toggle.not-approved { background: rgba(255,69,58,0.2);  border-color: rgba(255,69,58,0.5); }
.approve-toggle.unknown      { background: rgba(99,99,102,0.12); }

/* Dialog approval buttons */
.opt-approved    { background: rgba(48,209,88,0.2);  color: var(--confirmed); border: 1px solid rgba(48,209,88,0.4); }
.opt-notapproved { background: rgba(255,69,58,0.2);  color: var(--cancelled); border: 1px solid rgba(255,69,58,0.4); }
.dialog-section-label { font-size: 11px; color: var(--subtext); text-align: center; margin: 6px 0 4px; }

/* Drag ghost */
.drag-ghost {
  position: fixed; z-index: 9999; pointer-events: none;
  border-radius: var(--radius); overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
  opacity: 0.92; border-left: 4px solid var(--accent);
  background: var(--card); padding: 7px 8px 6px;
  transition: none;
}

/* Drop time indicator */
.drop-indicator {
  position: absolute; left: 44px; right: 8px;
  height: 3px; background: var(--accent); border-radius: 2px;
  pointer-events: none; z-index: 10;
}
.drop-indicator::before {
  content: attr(data-time);
  position: absolute; left: -40px; top: -8px;
  font-size: 10px; color: var(--accent); font-weight: 700;
  font-variant-numeric: tabular-nums;
}

/* ── Day footer ── */
.day-footer {
  padding: 8px 12px; background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0;
}
.day-footer button {
  flex: 1; padding: 10px; border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font);
}
.btn-confirm-all { background: var(--confirmed); color: #000; }
.btn-cancel-day  { background: var(--cancelled); color: #fff; }

/* ── Stats bar ── */
.stats-bar {
  padding: 6px 16px; background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--subtext); text-align: center; flex-shrink: 0;
}
.stats-bar span { margin: 0 4px; }

/* ── Bottom sheet dialog ── */
.dialog-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: flex-end; z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.dialog-overlay.visible { opacity: 1; pointer-events: auto; }
.dialog {
  background: var(--surface); border-radius: 16px 16px 0 0;
  padding: 20px 16px 32px; width: 100%;
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.32,0,0,1);
}
.dialog-overlay.visible .dialog { transform: translateY(0); }
.dialog-header { text-align: center; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.dialog-name   { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.dialog-meta   { font-size: 13px; color: var(--subtext); margin-bottom: 6px; }
.dialog-badges { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
.dialog-options { display: grid; gap: 8px; margin-bottom: 10px; }
.dialog-opt {
  padding: 13px; border-radius: var(--radius); border: none;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.dialog-opt:active { opacity: 0.75; }
.opt-confirmed { background: var(--confirmed); color: #000; }
.opt-wl        { background: var(--wl); color: #000; }
.opt-pd        { background: var(--pd); color: #000; }
.opt-cancelled { background: var(--cancelled); color: #fff; }
.opt-topic     { background: var(--accent); color: #fff; }
.opt-cancel    { background: var(--card); color: var(--text); }

/* ── Loading / empty ── */
.loading { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--subtext); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.no-data { text-align: center; padding: 32px; color: var(--subtext); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>🏥 OR Schedule</h1>
  <button class="refresh-btn" onclick="loadData()" title="Refresh">↻</button>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="search-wrap" id="searchWrap">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="search" placeholder="Search by name or file number…" oninput="onSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="schedule" id="schedule">
  <div class="loading"><div class="spinner"></div><span>Loading...</span></div>
</div>

<div class="day-footer" id="dayFooter" style="display:none">
  <button class="btn-confirm-all" onclick="confirmAll()">✅ Confirm All</button>
  <button class="btn-cancel-day"  onclick="cancelDay()">🔴 Cancel Day</button>
</div>

<div class="stats-bar" id="statsBar" style="display:none"></div>

<!-- Status dialog -->
<div class="dialog-overlay" id="dialogOverlay" onclick="closeDialog(event)">
  <div class="dialog">
    <div class="dialog-header">
      <div class="dialog-name"   id="dialogName"></div>
      <div class="dialog-meta"   id="dialogMeta"></div>
      <div class="dialog-badges" id="dialogBadges"></div>
    </div>
    <div class="dialog-section-label">— Insurance Approval —</div>
    <div class="dialog-options" style="grid-template-columns:1fr 1fr; display:grid; gap:8px; margin-bottom:10px;">
      <button class="dialog-opt opt-approved"    onclick="setApproval('Approved')">✅ Approved</button>
      <button class="dialog-opt opt-notapproved" onclick="setApproval('Not Approved')">❌ Not Approved</button>
    </div>
    <div class="dialog-section-label">— Schedule Status —</div>
    <div class="dialog-options">
      <button class="dialog-opt opt-confirmed" onclick="setStatus('Confirmed')">✅ Confirmed</button>
      <button class="dialog-opt opt-wl"        onclick="setStatus('WL')">⏳ Waiting List (WL)</button>
      <button class="dialog-opt opt-pd"        onclick="setStatus('PD')">⚠️ Pending Decision (PD)</button>
      <button class="dialog-opt opt-cancelled" onclick="setStatus('Cancelled')">❌ Cancelled</button>
    </div>
    <div id="dialogTopicWrap" style="display:none; margin-bottom:8px;">
      <button class="dialog-opt opt-topic" onclick="openTopic()">🔗 Open Telegram Topic</button>
    </div>
    <button class="dialog-opt opt-cancel" onclick="closeDialog()">Close</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const _params = new URLSearchParams(window.location.search);
const API = (_params.get('api') || '').replace(/\/$/, '');
const HEADERS = { 'Bypass-Tunnel-Reminder': 'true', 'Content-Type': 'application/json' };
function apiFetch(path, opts = {}) {
  return fetch(API + path, { ...opts, headers: { ...HEADERS, ...(opts.headers || {}) } });
}

const EN_DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const EN_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let allPatients  = [];
let selectedDate = null;
let selectedPatient = null;
let dates = [];

const HOUR_PX = 80; // pixels per hour
const MIN_H   = 7;

// ── Parse time string/object safely ──────────────────────────────
function parseTime(t) {
  if (!t) return { h: 7, m: 0 };
  const s = String(t);
  let match = s.match(/(\d{1,2}):(\d{2})/);
  if (match) return { h: parseInt(match[1]), m: parseInt(match[2]) };
  match = s.match(/T(\d{2}):(\d{2})/);
  if (match) return { h: parseInt(match[1]), m: parseInt(match[2]) };
  return { h: 7, m: 0 };
}

// ── Load data ─────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('schedule').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  document.getElementById('dayFooter').style.display = 'none';
  document.getElementById('statsBar').style.display  = 'none';
  try {
    const res = await apiFetch('/api/schedule');
    allPatients = await res.json();
    if (!Array.isArray(allPatients)) throw new Error('Invalid response');

    dates = [...new Set(allPatients.map(p => p.dateISO))].sort();
    if (dates.length === 0) {
      document.getElementById('schedule').innerHTML = '<div class="no-data">No scheduled patients</div>';
      document.getElementById('tabs').innerHTML = '';
      return;
    }
    buildTabs();
    if (!selectedDate || !dates.includes(selectedDate)) selectedDate = dates[0];
    renderDay(selectedDate);
  } catch (e) {
    document.getElementById('schedule').innerHTML =
      `<div class="no-data">Error loading data<br><small>${e.message}</small></div>`;
  }
}

// ── Tabs ──────────────────────────────────────────────────────────
function buildTabs() {
  const tabs = document.getElementById('tabs');
  const todayISO = new Date().toISOString().slice(0, 10);
  tabs.innerHTML = dates.map(d => {
    const dt = new Date(d + 'T00:00:00');
    const label = `${EN_DAYS[dt.getDay()]} ${dt.getDate()} ${EN_MONTHS[dt.getMonth()]}`;
    const isToday = d === todayISO;
    return `<button class="tab${d === selectedDate ? ' active' : ''}${isToday ? ' today' : ''}"
              data-date="${d}"
              onclick="selectDate('${d}')">${isToday ? '📌 ' : ''}${label}</button>`;
  }).join('');
}

function selectDate(d) {
  selectedDate = d;
  buildTabs();
  renderDay(d);
}

// ── Badges ────────────────────────────────────────────────────────
function statusBadge(sc) {
  const labels = { confirmed:'Confirmed', wl:'WL', pd:'PD', cancelled:'Cancelled', tentative:'Tentative' };
  return `<span class="badge badge-${sc}">${labels[sc] || sc}</span>`;
}
function approvalBadge(p) {
  if (p.approved)    return '<span class="badge badge-approved">Approved</span>';
  if (p.notApproved) return '<span class="badge badge-notapproved">Not Approved</span>';
  return '';
}
function approvalToggleBtn(p) {
  const state = p.approved ? 'approved' : p.notApproved ? 'not-approved' : 'unknown';
  const icon  = p.approved ? '✅' : p.notApproved ? '❌' : '⬜';
  return `<button class="approve-toggle ${state}" onclick="event.stopPropagation();cycleApproval(${p.rowNum})" title="Toggle approval">${icon}</button>`;
}

// ── Render day as calendar grid ───────────────────────────────────
function renderDay(dateISO) {
  const patients = allPatients.filter(p => p.dateISO === dateISO);

  const maxPat = patients.reduce((mx, p) => {
    const { h } = parseTime(p.timeStart);
    return Math.max(mx, h + (p.durationH || 1));
  }, 17);
  const MAX_H = Math.max(maxPat, 18);
  const gridH = (MAX_H - MIN_H) * HOUR_PX + 20;

  let html = `<div class="cal-grid" style="height:${gridH}px">`;

  // Time grid lines
  for (let h = MIN_H; h <= MAX_H; h++) {
    const y = (h - MIN_H) * HOUR_PX;
    html += `<div class="time-row" style="top:${y}px">
      <span class="time-label">${String(h).padStart(2,'0')}:00</span>
      <div class="time-line"></div>
    </div>`;
    if (h < MAX_H) {
      const yh = y + HOUR_PX / 2;
      html += `<div class="time-row" style="top:${yh}px"><div class="time-line half"></div></div>`;
    }
  }

  // Patient cards
  for (const p of patients) {
    const { h: ph, m: pm } = parseTime(p.timeStart);
    const topY   = (ph + pm / 60 - MIN_H) * HOUR_PX;
    const cardH  = Math.max((p.durationH || 1) * HOUR_PX - 4, 42);
    const apBadge = approvalToggleBtn(p);
    const stBadge = statusBadge(p.statusClass);
    const timeStr = `${String(ph).padStart(2,'0')}:${String(pm).padStart(2,'0')}`;

    html += `<div class="patient-card ${p.statusClass}"
                  data-rownum="${p.rowNum}"
                  style="top:${topY}px; height:${cardH}px;"
                  onclick="openDialog(${p.rowNum})">
      <div class="slot-row1">
        <span class="slot-time">${timeStr}</span>
        <span class="slot-name">${esc(p.fullName)}</span>
        <div class="slot-badges">${apBadge}${stBadge}</div>
      </div>`;

    if (cardH >= 52 && p.procedure) {
      html += `<div class="slot-row2">
        <span class="slot-proc">${esc(p.procedure)}</span>
        <span class="slot-dur">⏱ ${p.duration || '1h'}</span>
      </div>`;
    }
    if (cardH >= 72) {
      const fp = p.fileNo  ? `#${esc(p.fileNo)}` : '';
      const ph2 = p.phone   ? `📞 ${esc(p.phone)}` : '';
      if (fp || ph2) {
        html += `<div class="slot-row3">
          ${fp  ? `<span class="slot-file">${fp}</span>` : ''}
          ${ph2 ? `<span class="slot-phone">${ph2}</span>` : ''}
        </div>`;
      }
    }
    if (p.telegramLink) {
      html += `<button class="topic-btn" onclick="event.stopPropagation();openTopicLink('${esc(p.telegramLink)}')">🔗</button>`;
    }
    html += `</div>`;
  }

  html += '</div>';
  document.getElementById('schedule').innerHTML = html;

  // Setup drag for each card
  patients.forEach(p => {
    const card = document.querySelector(`.patient-card[data-rownum="${p.rowNum}"]`);
    if (card) setupDrag(card, p);
  });

  // Stats
  const total     = patients.length;
  const confirmed = patients.filter(p => p.statusClass === 'confirmed').length;
  const wl        = patients.filter(p => p.statusClass === 'wl').length;
  const pd        = patients.filter(p => p.statusClass === 'pd').length;
  const cancelled = patients.filter(p => p.statusClass === 'cancelled').length;
  const tentative = patients.filter(p => p.statusClass === 'tentative').length;

  const statsBar = document.getElementById('statsBar');
  statsBar.style.display = 'block';
  statsBar.innerHTML =
    `<span>📊 ${total} patient${total !== 1 ? 's' : ''}</span>` +
    (confirmed ? `<span>✅ ${confirmed}</span>` : '') +
    (wl        ? `<span>⏳ ${wl} WL</span>` : '') +
    (pd        ? `<span>⚠️ ${pd} PD</span>` : '') +
    (tentative ? `<span>🔵 ${tentative} tentative</span>` : '') +
    (cancelled ? `<span>❌ ${cancelled}</span>` : '');

  document.getElementById('dayFooter').style.display = patients.length > 0 ? 'flex' : 'none';
}

// ── Drag & Drop ───────────────────────────────────────────────────
let dragState      = null;
let longPressTimer = null;
let ghostEl        = null;
let dropLine       = null;

function setupDrag(card, patient) {
  card.addEventListener('touchstart',  e => onTouchStart(e, card, patient), { passive: true });
  card.addEventListener('touchmove',   onTouchMove,   { passive: false });
  card.addEventListener('touchend',    onTouchEnd);
  card.addEventListener('touchcancel', cancelDrag);
}

function onTouchStart(e, card, patient) {
  const touch = e.touches[0];
  const startX = touch.clientX, startY = touch.clientY;

  longPressTimer = setTimeout(() => {
    tg?.HapticFeedback?.impactOccurred('medium');
    beginDrag(card, patient, touch);
  }, 480);

  const onEarlyMove = (ev) => {
    const t = ev.touches[0];
    if (Math.abs(t.clientX - startX) > 8 || Math.abs(t.clientY - startY) > 8) {
      clearTimeout(longPressTimer);
      card.removeEventListener('touchmove', onEarlyMove);
    }
  };
  card.addEventListener('touchmove', onEarlyMove, { passive: true });
}

function beginDrag(card, patient, touch) {
  const rect = card.getBoundingClientRect();
  dragState = {
    patient,
    card,
    offsetY: touch.clientY - rect.top,
    offsetX: touch.clientX - rect.left,
    cardW:   rect.width,
    cardH:   rect.height,
  };

  // Ghost
  ghostEl = document.createElement('div');
  ghostEl.className = 'drag-ghost patient-card ' + patient.statusClass;
  ghostEl.style.width  = rect.width  + 'px';
  ghostEl.style.height = rect.height + 'px';
  ghostEl.style.left   = rect.left + 'px';
  ghostEl.style.top    = rect.top  + 'px';
  ghostEl.innerHTML = card.innerHTML;
  document.body.appendChild(ghostEl);

  card.classList.add('drag-src');

  // Drop line
  dropLine = document.createElement('div');
  dropLine.className = 'drop-indicator';
  dropLine.style.display = 'none';
  const grid = document.querySelector('.cal-grid');
  if (grid) grid.appendChild(dropLine);

  document.addEventListener('touchmove', preventScroll, { passive: false });
}

function preventScroll(e) { if (dragState) e.preventDefault(); }

function onTouchMove(e) {
  if (!dragState) return;
  clearTimeout(longPressTimer);
  const touch = e.touches[0];

  // Move ghost
  ghostEl.style.left = (touch.clientX - dragState.offsetX) + 'px';
  ghostEl.style.top  = (touch.clientY - dragState.offsetY) + 'px';

  // Check if over tabs
  const tabsRect = document.querySelector('.tabs-wrap').getBoundingClientRect();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));

  if (touch.clientY <= tabsRect.bottom) {
    // Over tabs area
    const tabs = document.querySelectorAll('.tab');
    const overTab = [...tabs].find(t => {
      const r = t.getBoundingClientRect();
      return touch.clientX >= r.left && touch.clientX <= r.right;
    });
    if (overTab) overTab.classList.add('drag-over');
    if (dropLine) dropLine.style.display = 'none';
  } else {
    // Over calendar
    if (dropLine) {
      const grid = document.querySelector('.cal-grid');
      if (grid) {
        const gr = grid.getBoundingClientRect();
        const relY = touch.clientY - gr.top;
        const rawH = MIN_H + relY / HOUR_PX;
        const snap = Math.round(rawH * 2) / 2;
        const snapH = Math.floor(snap);
        const snapM = (snap % 1) * 60;
        const snapY = (snap - MIN_H) * HOUR_PX;
        const timeStr = `${String(snapH).padStart(2,'0')}:${String(snapM).padStart(2,'0')}`;
        dropLine.style.display = 'block';
        dropLine.style.top     = snapY + 'px';
        dropLine.dataset.time  = timeStr;
      }
    }
  }
}

function onTouchEnd(e) {
  clearTimeout(longPressTimer);
  if (!dragState) return;
  const touch = e.changedTouches[0];

  // Cleanup
  ghostEl?.remove(); ghostEl = null;
  dropLine?.remove(); dropLine = null;
  dragState.card.classList.remove('drag-src');
  document.removeEventListener('touchmove', preventScroll);
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));

  const { patient } = dragState;
  dragState = null;

  // Was over tabs?
  const tabsRect = document.querySelector('.tabs-wrap').getBoundingClientRect();
  if (touch.clientY <= tabsRect.bottom) {
    const tabs = document.querySelectorAll('.tab');
    const overTab = [...tabs].find(t => {
      const r = t.getBoundingClientRect();
      return touch.clientX >= r.left && touch.clientX <= r.right;
    });
    if (overTab) {
      const newDate = overTab.dataset.date;
      if (newDate && newDate !== selectedDate) {
        const dt = new Date(newDate + 'T00:00:00');
        const label = `${EN_DAYS[dt.getDay()]} ${dt.getDate()} ${EN_MONTHS[dt.getMonth()]}`;
        if (confirm(`Move ${patient.fullName}\nto ${label}?`)) {
          movePatientDate(patient, newDate);
        }
      }
    }
    return;
  }

  // Over calendar — snap time
  const grid = document.querySelector('.cal-grid');
  if (grid) {
    const gr = grid.getBoundingClientRect();
    const relY = touch.clientY - gr.top;
    const rawH = MIN_H + relY / HOUR_PX;
    const snap = Math.round(rawH * 2) / 2;
    const snapH = Math.max(MIN_H, Math.floor(snap));
    const snapM = (snap % 1) * 60;
    const newTime = `${String(snapH).padStart(2,'0')}:${String(snapM).padStart(2,'0')}`;
    const { h: origH, m: origM } = parseTime(patient.timeStart);
    const origTime = `${String(origH).padStart(2,'0')}:${String(origM).padStart(2,'0')}`;
    if (newTime !== origTime) {
      if (confirm(`Reschedule ${patient.fullName}\n${origTime} → ${newTime}?`)) {
        reschedulePatient(patient, newTime);
      }
    }
  }
}

function cancelDrag() {
  clearTimeout(longPressTimer);
  if (!dragState) return;
  ghostEl?.remove(); ghostEl = null;
  dropLine?.remove(); dropLine = null;
  dragState.card.classList.remove('drag-src');
  document.removeEventListener('touchmove', preventScroll);
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
  dragState = null;
}

async function reschedulePatient(patient, newTime) {
  try {
    const res  = await apiFetch('/api/reschedule', { method: 'POST', body: JSON.stringify({ rowNum: patient.rowNum, newTime }) });
    const data = await res.json();
    if (data.ok) { await loadData(); tg?.HapticFeedback?.notificationOccurred('success'); }
    else alert('Error: ' + (data.error || 'Reschedule failed'));
  } catch (e) { alert('Connection error: ' + e.message); }
}

async function movePatientDate(patient, newDate) {
  try {
    const res  = await apiFetch('/api/move-date', { method: 'POST', body: JSON.stringify({ rowNum: patient.rowNum, newDate }) });
    const data = await res.json();
    if (data.ok) {
      await loadData();
      selectDate(newDate);
      tg?.HapticFeedback?.notificationOccurred('success');
    } else alert('Error: ' + (data.error || 'Move failed'));
  } catch (e) { alert('Connection error: ' + e.message); }
}

// ── Dialog ────────────────────────────────────────────────────────
function openDialog(rowNum) {
  const p = allPatients.find(x => x.rowNum === rowNum);
  if (!p || dragState) return;
  selectedPatient = p;

  document.getElementById('dialogName').textContent = p.fullName || p.name;

  const meta = [];
  if (p.fileNo)    meta.push(`File #${p.fileNo}`);
  if (p.phone)     meta.push(`📞 ${p.phone}`);
  if (p.procedure) meta.push(p.procedure);
  if (p.duration)  meta.push(`⏱ ${p.duration}`);
  document.getElementById('dialogMeta').textContent = meta.join('  ·  ');

  document.getElementById('dialogBadges').innerHTML = approvalBadge(p) + statusBadge(p.statusClass);
  document.getElementById('dialogTopicWrap').style.display = p.telegramLink ? 'block' : 'none';
  document.getElementById('dialogOverlay').classList.add('visible');
}

function closeDialog(e) {
  if (!e || e.target === document.getElementById('dialogOverlay')) {
    document.getElementById('dialogOverlay').classList.remove('visible');
    selectedPatient = null;
  }
}

function openTopic() {
  if (!selectedPatient?.telegramLink) return;
  openTopicLink(selectedPatient.telegramLink);
}

function openTopicLink(link) {
  if (tg?.openTelegramLink) tg.openTelegramLink(link);
  else window.open(link, '_blank');
}

async function setStatus(status) {
  if (!selectedPatient) return;
  document.getElementById('dialogOverlay').classList.remove('visible');
  const p = selectedPatient; selectedPatient = null;
  try {
    const res  = await apiFetch('/api/update', { method: 'POST', body: JSON.stringify({ rowNum: p.rowNum, status }) });
    const data = await res.json();
    if (data.ok) { await loadData(); tg?.HapticFeedback?.notificationOccurred('success'); }
    else alert('Error: ' + (data.error || 'Update failed'));
  } catch (e) { alert('Connection error: ' + e.message); }
}

async function cycleApproval(rowNum) {
  const p = allPatients.find(x => x.rowNum === rowNum);
  if (!p) return;
  const next = (!p.approved && !p.notApproved) ? 'Approved' : p.approved ? 'Not Approved' : '';
  await setApprovalForRow(rowNum, next);
}

async function setApproval(approvalText) {
  if (!selectedPatient) return;
  document.getElementById('dialogOverlay').classList.remove('visible');
  const p = selectedPatient; selectedPatient = null;
  await setApprovalForRow(p.rowNum, approvalText);
}

async function setApprovalForRow(rowNum, approvalText) {
  try {
    const res  = await apiFetch('/api/approve', { method: 'POST', body: JSON.stringify({ rowNum, approval: approvalText }) });
    const data = await res.json();
    if (data.ok) { await loadData(); tg?.HapticFeedback?.notificationOccurred('success'); }
    else alert('Error: ' + (data.error || 'Approval update failed'));
  } catch (e) { alert('Connection error: ' + e.message); }
}

async function confirmAll() {
  const pts = allPatients.filter(p => p.dateISO === selectedDate && p.statusClass !== 'confirmed');
  if (!pts.length) { alert('All patients already confirmed'); return; }
  for (const p of pts) await apiFetch('/api/update', { method: 'POST', body: JSON.stringify({ rowNum: p.rowNum, status: 'Confirmed' }) });
  await loadData();
  tg?.HapticFeedback?.notificationOccurred('success');
}

async function cancelDay() {
  const pts = allPatients.filter(p => p.dateISO === selectedDate && p.statusClass !== 'cancelled');
  if (!pts.length) { alert('No patients to cancel'); return; }
  if (!confirm('Cancel all patients for this day?')) return;
  for (const p of pts) await apiFetch('/api/update', { method: 'POST', body: JSON.stringify({ rowNum: p.rowNum, status: 'Cancelled' }) });
  await loadData();
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
}

// ── Search ────────────────────────────────────────────────────────
let searchQuery = '';

function onSearch(q) {
  searchQuery = q.trim().toLowerCase();
  document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none';
  if (searchQuery) renderSearch(searchQuery);
  else renderDay(selectedDate);
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  renderDay(selectedDate);
}

function renderSearch(q) {
  const matches = allPatients.filter(p => {
    const name = (p.fullName || p.name || '').toLowerCase();
    const file = String(p.fileNo || '').toLowerCase();
    const proc = (p.procedure || '').toLowerCase();
    return name.includes(q) || file.includes(q) || proc.includes(q);
  });

  if (!matches.length) {
    document.getElementById('schedule').innerHTML = `<div class="sr-no-results">No results for "<b>${esc(q)}</b>"</div>`;
    document.getElementById('dayFooter').style.display = 'none';
    document.getElementById('statsBar').style.display  = 'none';
    return;
  }

  // Group by date
  const byDate = {};
  matches.forEach(p => {
    if (!byDate[p.dateISO]) byDate[p.dateISO] = [];
    byDate[p.dateISO].push(p);
  });

  let html = '';
  Object.keys(byDate).sort().forEach(dateISO => {
    const dt = new Date(dateISO + 'T00:00:00');
    const label = `${EN_DAYS[dt.getDay()]}, ${dt.getDate()} ${EN_MONTHS[dt.getMonth()]}`;
    html += `<div class="search-result-date">${label}</div>`;
    byDate[dateISO].forEach(p => {
      const { h: ph, m: pm } = parseTime(p.timeStart);
      const timeStr = `${String(ph).padStart(2,'0')}:${String(pm).padStart(2,'0')}`;
      html += `<div class="search-result-card ${p.statusClass}" onclick="jumpToPatient('${p.dateISO}', ${p.rowNum})">
        <div class="sr-row1">
          <span class="sr-name">${esc(p.fullName || p.name)}</span>
          ${approvalBadge(p)}${statusBadge(p.statusClass)}
        </div>
        <div class="sr-row2">
          <span>⏰ ${timeStr}</span>
          ${p.fileNo    ? `<span>#${esc(p.fileNo)}</span>` : ''}
          ${p.procedure ? `<span>${esc(p.procedure)}</span>` : ''}
          ${p.phone     ? `<span>📞 ${esc(p.phone)}</span>` : ''}
        </div>
      </div>`;
    });
  });

  document.getElementById('schedule').innerHTML = html;
  document.getElementById('dayFooter').style.display = 'none';
  document.getElementById('statsBar').innerHTML =
    `<span>🔍 ${matches.length} result${matches.length !== 1 ? 's' : ''}</span>`;
  document.getElementById('statsBar').style.display = 'block';
}

function jumpToPatient(dateISO, rowNum) {
  clearSearch();
  selectDate(dateISO);
  // Brief highlight after render
  setTimeout(() => {
    const card = document.querySelector(`.patient-card[data-rownum="${rowNum}"]`);
    if (card) {
      card.scrollIntoView({ block: 'center', behavior: 'smooth' });
      card.style.boxShadow = '0 0 0 3px var(--accent)';
      setTimeout(() => card.style.boxShadow = '', 1500);
    }
  }, 150);
}

// Apply Telegram theme
if (tg?.themeParams) {
  const tp = tg.themeParams;
  if (tp.bg_color)           document.documentElement.style.setProperty('--bg',      tp.bg_color);
  if (tp.secondary_bg_color) document.documentElement.style.setProperty('--surface', tp.secondary_bg_color);
  if (tp.text_color)         document.documentElement.style.setProperty('--text',    tp.text_color);
  if (tp.hint_color)         document.documentElement.style.setProperty('--subtext', tp.hint_color);
  if (tp.link_color)         document.documentElement.style.setProperty('--accent',  tp.link_color);
}

loadData();
</script>
