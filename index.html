<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OR Schedule</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0f0f0f;
  --surface:    #1c1c1e;
  --card:       #2c2c2e;
  --border:     #3a3a3c;
  --text:       #ffffff;
  --subtext:    #8e8e93;
  --confirmed:  #30d158;
  --wl:         #ffd60a;
  --pd:         #ff9f0a;
  --cancelled:  #ff453a;
  --tentative:  #636366;
  --approved:   #30d158;
  --notapproved:#ff453a;
  --accent:     #0a84ff;
  --radius:     12px;
  --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
body { display: flex; flex-direction: column; overflow: hidden; }

/* ── Header ── */
.header {
  padding: 14px 16px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.header .refresh-btn {
  background: none; border: none; color: var(--accent);
  font-size: 20px; cursor: pointer; padding: 4px; line-height: 1;
}

/* ── Date tabs ── */
.tabs-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs {
  display: flex;
  padding: 8px 12px;
  gap: 8px;
  width: max-content;
}
.tab {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--subtext);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  font-family: var(--font);
}
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab.today  { border-color: var(--accent); color: var(--accent); }
.tab.today.active { color: #fff; }

/* ── Schedule body ── */
.schedule { flex: 1; overflow-y: auto; padding: 10px 12px 0; }

/* ── Slot card ── */
.slot {
  background: var(--card);
  border-radius: var(--radius);
  padding: 11px 13px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: opacity 0.15s;
  position: relative;
  border-left: 4px solid transparent;
}
.slot:active { opacity: 0.75; }
.slot.empty {
  background: transparent;
  border: 1.5px dashed var(--available, #3a3a3c);
  cursor: default;
  border-left-width: 1.5px;
}
.slot.empty:active { opacity: 1; }

.slot.confirmed { border-left-color: var(--confirmed); }
.slot.wl        { border-left-color: var(--wl); }
.slot.pd        { border-left-color: var(--pd); }
.slot.cancelled { border-left-color: var(--cancelled); opacity: 0.6; }
.slot.tentative { border-left-color: var(--tentative); }

/* Row 1: time + name + icons */
.slot-row1 {
  display: flex;
  align-items: center;
  gap: 8px;
}
.slot-time {
  font-size: 12px;
  font-weight: 600;
  color: var(--subtext);
  min-width: 38px;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.slot-name {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.slot-badges { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 6px;
  white-space: nowrap;
  line-height: 1.4;
}
.badge-approved    { background: rgba(48,209,88,0.18);  color: var(--confirmed); }
.badge-notapproved { background: rgba(255,69,58,0.18);  color: var(--cancelled); }
.badge-confirmed   { background: rgba(48,209,88,0.18);  color: var(--confirmed); }
.badge-wl          { background: rgba(255,214,10,0.18); color: var(--wl); }
.badge-pd          { background: rgba(255,159,10,0.18); color: var(--pd); }
.badge-cancelled   { background: rgba(255,69,58,0.18);  color: var(--cancelled); }
.badge-tentative   { background: rgba(99,99,102,0.25);  color: var(--subtext); }

/* Row 2: procedure + duration */
.slot-row2 {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  padding-left: 46px;
}
.slot-proc {
  font-size: 12px;
  color: var(--subtext);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.slot-dur {
  font-size: 11px;
  color: var(--subtext);
  flex-shrink: 0;
}

/* Row 3: file + phone */
.slot-row3 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 2px;
  padding-left: 46px;
}
.slot-file  { font-size: 11px; color: var(--subtext); }
.slot-phone { font-size: 11px; color: var(--subtext); }

/* Empty slot */
.slot-available { font-size: 13px; color: var(--subtext); padding-left: 46px; }

/* ── Day footer ── */
.day-footer {
  padding: 10px 12px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.day-footer button {
  flex: 1; padding: 10px;
  border-radius: var(--radius); border: none;
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: var(--font);
  transition: opacity 0.15s;
}
.day-footer button:active { opacity: 0.75; }
.btn-confirm-all { background: var(--confirmed); color: #000; }
.btn-cancel-day  { background: var(--cancelled); color: #fff; }

/* ── Stats bar ── */
.stats-bar {
  padding: 7px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--subtext);
  text-align: center;
  flex-shrink: 0;
}
.stats-bar span { margin: 0 4px; }

/* ── Dialog ── */
.dialog-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: flex-end;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.dialog-overlay.visible { opacity: 1; pointer-events: auto; }
.dialog {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 20px 16px 32px;
  width: 100%;
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.32,0,0,1);
}
.dialog-overlay.visible .dialog { transform: translateY(0); }

.dialog-header {
  text-align: center;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.dialog-name {
  font-size: 17px; font-weight: 700; margin-bottom: 6px;
}
.dialog-meta {
  font-size: 13px; color: var(--subtext); margin-bottom: 6px;
}
.dialog-badges { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }

.dialog-options { display: grid; gap: 8px; margin-bottom: 10px; }
.dialog-opt {
  padding: 14px; border-radius: var(--radius); border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: var(--font); transition: opacity 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.dialog-opt:active { opacity: 0.75; }
.opt-confirmed { background: var(--confirmed); color: #000; }
.opt-wl        { background: var(--wl);        color: #000; }
.opt-pd        { background: var(--pd);        color: #000; }
.opt-cancelled { background: var(--cancelled); color: #fff; }
.opt-topic     { background: var(--accent);    color: #fff; }
.opt-cancel    { background: var(--card);       color: var(--text); }

/* ── Loading / empty ── */
.loading {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: var(--subtext);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.no-data { text-align: center; padding: 32px; color: var(--subtext); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>🏥 OR Schedule</h1>
  <button class="refresh-btn" onclick="loadData()" title="Refresh">↻</button>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="schedule" id="schedule">
  <div class="loading"><div class="spinner"></div><span>Loading...</span></div>
</div>

<div class="day-footer" id="dayFooter" style="display:none">
  <button class="btn-confirm-all" onclick="confirmAll()">✅ Confirm All</button>
  <button class="btn-cancel-day"  onclick="cancelDay()">🔴 Cancel Day</button>
</div>

<div class="stats-bar" id="statsBar" style="display:none"></div>

<!-- Status dialog -->
<div class="dialog-overlay" id="dialogOverlay" onclick="closeDialog(event)">
  <div class="dialog">
    <div class="dialog-header">
      <div class="dialog-name"  id="dialogName"></div>
      <div class="dialog-meta"  id="dialogMeta"></div>
      <div class="dialog-badges" id="dialogBadges"></div>
    </div>
    <div class="dialog-options">
      <button class="dialog-opt opt-confirmed" onclick="setStatus('Confirmed')">✅ Confirmed</button>
      <button class="dialog-opt opt-wl"        onclick="setStatus('WL')">⏳ Waiting List (WL)</button>
      <button class="dialog-opt opt-pd"        onclick="setStatus('PD')">⚠️ Pending Decision (PD)</button>
      <button class="dialog-opt opt-cancelled" onclick="setStatus('Cancelled')">❌ Cancelled</button>
    </div>
    <div id="dialogTopicWrap" style="display:none; margin-bottom:8px;">
      <button class="dialog-opt opt-topic" onclick="openTopic()">🔗 Open Telegram Topic</button>
    </div>
    <button class="dialog-opt opt-cancel" onclick="closeDialog()">Close</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const _params = new URLSearchParams(window.location.search);
const API = (_params.get('api') || '').replace(/\/$/, '');
const HEADERS = { 'Bypass-Tunnel-Reminder': 'true', 'Content-Type': 'application/json' };
function apiFetch(path, opts = {}) {
  return fetch(API + path, { ...opts, headers: { ...HEADERS, ...(opts.headers || {}) } });
}

const EN_DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const EN_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const STATUS_LABELS = {
  confirmed: 'Confirmed', wl: 'WL', pd: 'PD', cancelled: 'Cancelled', tentative: 'Tentative'
};

let allPatients = [];
let selectedDate = null;
let selectedPatient = null;
let dates = [];

async function loadData() {
  document.getElementById('schedule').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  document.getElementById('dayFooter').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';

  try {
    const res = await apiFetch('/api/schedule');
    allPatients = await res.json();
    if (!Array.isArray(allPatients)) throw new Error('Invalid response');

    dates = [...new Set(allPatients.map(p => p.dateISO))].sort();
    if (dates.length === 0) {
      document.getElementById('schedule').innerHTML = '<div class="no-data">No scheduled patients</div>';
      document.getElementById('tabs').innerHTML = '';
      return;
    }

    buildTabs();
    if (!selectedDate || !dates.includes(selectedDate)) selectedDate = dates[0];
    renderDay(selectedDate);
  } catch (e) {
    document.getElementById('schedule').innerHTML =
      `<div class="no-data">Error loading data<br><small>${e.message}</small></div>`;
  }
}

function buildTabs() {
  const tabs = document.getElementById('tabs');
  const todayISO = new Date().toISOString().slice(0, 10);
  tabs.innerHTML = dates.map(d => {
    const dt = new Date(d + 'T00:00:00');
    const label = `${EN_DAYS[dt.getDay()]} ${dt.getDate()} ${EN_MONTHS[dt.getMonth()]}`;
    const isToday = d === todayISO;
    return `<button class="tab${d === selectedDate ? ' active' : ''}${isToday ? ' today' : ''}"
              onclick="selectDate('${d}')">${isToday ? '📌 ' : ''}${label}</button>`;
  }).join('');
}

function selectDate(d) {
  selectedDate = d;
  buildTabs();
  renderDay(d);
}

function statusBadge(sc) {
  const labels = { confirmed:'Confirmed', wl:'WL', pd:'PD', cancelled:'Cancelled', tentative:'Tentative' };
  return `<span class="badge badge-${sc}">${labels[sc] || sc}</span>`;
}

function approvalBadge(p) {
  if (p.approved)    return '<span class="badge badge-approved">Approved</span>';
  if (p.notApproved) return '<span class="badge badge-notapproved">Not Approved</span>';
  return '';
}

function renderDay(dateISO) {
  const patients = allPatients.filter(p => p.dateISO === dateISO);
  const MIN_H = 7, MAX_H = 17;

  const patByHour = {};
  for (const p of patients) {
    const [ph] = (p.timeStart || '07:00').split(':').map(Number);
    patByHour[ph] = p;
  }

  const allHours = new Set([...Object.keys(patByHour).map(Number)]);
  const maxH = Math.max(MAX_H, ...(allHours.size ? [...allHours].map(n => n + 1) : [MAX_H])) + 1;

  let html = '';
  for (let hour = MIN_H; hour <= maxH; hour++) {
    const p = patByHour[hour];
    const timeStr = `${String(hour).padStart(2,'0')}:00`;

    if (p) {
      const apBadge = approvalBadge(p);
      const stBadge = statusBadge(p.statusClass);
      html += `<div class="slot ${p.statusClass}" onclick="openDialog(${p.rowNum})">
        <div class="slot-row1">
          <span class="slot-time">${timeStr}</span>
          <span class="slot-name">${esc(p.fullName)}</span>
          <div class="slot-badges">${apBadge}${stBadge}</div>
        </div>`;
      if (p.procedure) {
        html += `<div class="slot-row2">
          <span class="slot-proc">${esc(p.procedure)}</span>
          <span class="slot-dur">⏱ ${p.duration}</span>
        </div>`;
      }
      const filePart  = p.fileNo  ? `#${esc(p.fileNo)}` : '';
      const phonePart = p.phone   ? `📞 ${esc(p.phone)}` : '';
      if (filePart || phonePart) {
        html += `<div class="slot-row3">
          ${filePart  ? `<span class="slot-file">${filePart}</span>` : ''}
          ${phonePart ? `<span class="slot-phone">${phonePart}</span>` : ''}
        </div>`;
      }
      html += `</div>`;

      for (let s = 1; s < p.durationH; s++) {
        hour++;
        html += `<div class="slot empty">
          <span class="slot-time">${String(hour).padStart(2,'0')}:00</span>
          <span class="slot-available">↕ (cont.)</span>
        </div>`;
      }
    } else {
      html += `<div class="slot empty">
        <span class="slot-time">${timeStr}</span>
        <span class="slot-available">Available</span>
      </div>`;
    }
  }

  document.getElementById('schedule').innerHTML = html || '<div class="no-data">No patients</div>';

  const total     = patients.length;
  const confirmed = patients.filter(p => p.statusClass === 'confirmed').length;
  const wl        = patients.filter(p => p.statusClass === 'wl').length;
  const pd        = patients.filter(p => p.statusClass === 'pd').length;
  const cancelled = patients.filter(p => p.statusClass === 'cancelled').length;
  const tentative = patients.filter(p => p.statusClass === 'tentative').length;

  const statsBar = document.getElementById('statsBar');
  statsBar.style.display = 'block';
  statsBar.innerHTML = `<span>📊 ${total} patient${total !== 1 ? 's' : ''}</span>` +
    (confirmed ? `<span>✅ ${confirmed} confirmed</span>` : '') +
    (wl        ? `<span>⏳ ${wl} WL</span>` : '') +
    (pd        ? `<span>⚠️ ${pd} PD</span>` : '') +
    (tentative ? `<span>🔵 ${tentative} tentative</span>` : '') +
    (cancelled ? `<span>❌ ${cancelled} cancelled</span>` : '');

  const footer = document.getElementById('dayFooter');
  footer.style.display = patients.length > 0 ? 'flex' : 'none';
}

function openDialog(rowNum) {
  const p = allPatients.find(x => x.rowNum === rowNum);
  if (!p) return;
  selectedPatient = p;

  document.getElementById('dialogName').textContent = p.fullName || p.name;

  const metaParts = [];
  if (p.fileNo)    metaParts.push(`File #${p.fileNo}`);
  if (p.phone)     metaParts.push(`📞 ${p.phone}`);
  if (p.procedure) metaParts.push(p.procedure);
  if (p.duration)  metaParts.push(`⏱ ${p.duration}`);
  document.getElementById('dialogMeta').textContent = metaParts.join('  ·  ');

  const badgeHtml = approvalBadge(p) + statusBadge(p.statusClass);
  document.getElementById('dialogBadges').innerHTML = badgeHtml;

  const topicWrap = document.getElementById('dialogTopicWrap');
  topicWrap.style.display = p.telegramLink ? 'block' : 'none';

  document.getElementById('dialogOverlay').classList.add('visible');
}

function closeDialog(e) {
  if (!e || e.target === document.getElementById('dialogOverlay')) {
    document.getElementById('dialogOverlay').classList.remove('visible');
    selectedPatient = null;
  }
}

function openTopic() {
  if (!selectedPatient?.telegramLink) return;
  if (tg?.openTelegramLink) {
    tg.openTelegramLink(selectedPatient.telegramLink);
  } else {
    window.open(selectedPatient.telegramLink, '_blank');
  }
}

async function setStatus(status) {
  if (!selectedPatient) return;
  document.getElementById('dialogOverlay').classList.remove('visible');
  const p = selectedPatient;
  selectedPatient = null;

  try {
    const res = await apiFetch('/api/update', {
      method: 'POST',
      body: JSON.stringify({ rowNum: p.rowNum, status }),
    });
    const data = await res.json();
    if (data.ok) {
      await loadData();
      if (tg) tg.HapticFeedback?.notificationOccurred('success');
    } else {
      alert('Error: ' + (data.error || 'Update failed'));
    }
  } catch (e) {
    alert('Connection error: ' + e.message);
  }
}

async function confirmAll() {
  const patients = allPatients.filter(p => p.dateISO === selectedDate && p.statusClass !== 'confirmed');
  if (patients.length === 0) { alert('All patients are already confirmed'); return; }
  for (const p of patients) {
    await apiFetch('/api/update', {
      method: 'POST',
      body: JSON.stringify({ rowNum: p.rowNum, status: 'Confirmed' }),
    });
  }
  await loadData();
  if (tg) tg.HapticFeedback?.notificationOccurred('success');
}

async function cancelDay() {
  const patients = allPatients.filter(p => p.dateISO === selectedDate && p.statusClass !== 'cancelled');
  if (patients.length === 0) { alert('No patients to cancel'); return; }
  if (!confirm('Cancel all patients for this day?')) return;
  for (const p of patients) {
    await apiFetch('/api/update', {
      method: 'POST',
      body: JSON.stringify({ rowNum: p.rowNum, status: 'Cancelled' }),
    });
  }
  await loadData();
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

if (tg?.themeParams) {
  const tp = tg.themeParams;
  if (tp.bg_color)           document.documentElement.style.setProperty('--bg',      tp.bg_color);
  if (tp.secondary_bg_color) document.documentElement.style.setProperty('--surface', tp.secondary_bg_color);
  if (tp.text_color)         document.documentElement.style.setProperty('--text',    tp.text_color);
  if (tp.hint_color)         document.documentElement.style.setProperty('--subtext', tp.hint_color);
  if (tp.link_color)         document.documentElement.style.setProperty('--accent',  tp.link_color);
}

loadData();
</script>
</body>
</html>
